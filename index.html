<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta obligatoria para activar la responsividad nativa y el giro automático en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Pares e Impares</title>
    <!-- Importación oficial de Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style type="text/tailwindcss">

  @import "tailwindcss";

   @layer base {

     :root {

      @apply text-sm;

       line-height: 1.5;
     }
  }
</style>


    <style type="text/tailwindcss">
      @import "tailwindcss";
      @layer base {
         :root {
          @apply text-base sm:text-lg;
           line-height: 1.6;
         }
      }
    </style>
</head>

<body class="bg-[#A5CF83] bg-cover bg-center bg-no-repeat w-full min-h-screen flex items-center justify-center min-h-screen p-4 sm:p-6 md:p-10">

    <!-- CONTENEDOR 'MAIN' PANORÁMICO ULTRA-RESPONSIVO (w-full para móviles, max-w-3xl para PC) -->
    <main class="bg-[#FFF0E4] p-5 sm:p-10 md:p-14 w-full max-w-xl min-h-[460px] sm:min-h-[500px] flex flex-col justify-between border-2 border-slate-200 rounded-3xl shadow-2xl text-center transition-all duration-300">
        
        <div class="w-full">
            <header class="text-center mb-6 sm:mb-8">
                <h1 class="text-xl sm:text-3xl font-black text-amber-500 tracking-tight uppercase">Clasificador Numérico</h1>
                <p class="text-base sm:text-xl font-bold text-slate-800 mt-2">Separa números pares e impares en formato de objeto</p>
            </header>

            <!-- Formulario Panorámico Puro sin JavaScript mezclado -->
            <form id="validador-form" class="space-y-6 sm:space-y-8 w-full" novalidate>
                <div class="text-left w-full">
                    <label for="input-numeros" class="block text-base sm:text-lg font-bold text-center text-slate-800 mb-3 tracking-wide">
                        Introduce números separados por comas:
                    </label>
                    <input 
                        type="text" 
                        id="input-numeros" 
                        placeholder="Ej. 1,2,3,4,5,6,7,8,9,0" 
                        required
                        autocomplete="off"
                        class="w-full px-4 sm:px-6 py-2 sm:py-2 border-2 border-slate-300 rounded-2xl text-slate-800 font-normal text-lg sm:text-2xl focus:ring-4 focus:ring-blue-400 focus:border-blue-500 outline-none transition-all bg-slate-50 shadow-inner break-all"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-1 sm:py-2 px-6 sm:px-8 rounded-2xl transition-all duration-200 cursor-pointer shadow-md active:scale-98 text-center text-lg sm:text-xl tracking-widest uppercase"
                >
                    Clasificar Arreglos
                </button>
            </form>
        </div>

        <!-- Ficha de Resultados Dinámica de Alto Contraste (Oculta por defecto con 'hidden') -->
        <div id="resultado-validacion" class="hidden mt-6 sm:mt-8 p-4 sm:p-5 rounded-2xl font-mono border-4 bg-slate-950 text-white border-slate-800 shadow-2xl max-w-full overflow-hidden text-left">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-3 border-b border-slate-800 pb-2">Objeto Final Retornado:</p>
            <!-- Aquí se inyectará el formato de objeto exacto de tu ejemplo -->
            <p id="texto-objeto" class="text-base sm:text-2xl font-black text-emerald-400 tracking-wide break-all"></p>
        </div>

    </main>

    <!-- ÚNICA VINCULACIÓN JAVASCRIPT AL FINAL DEL CUERPO -->
    <script src="./js/app.js"></script>
</body>
</html>
